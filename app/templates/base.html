<!-- مسیر فایل: app/templates/base.html -->

<!DOCTYPE html>
<html lang="fa" dir="rtl" class="light"> <!-- برای حالت تاریک کلاس dark به این تگ اضافه می‌شود -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | EstateMind AI</title>
    
    <!-- فونت وزیرمتن -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <!-- آیکون‌های Phosphor (مدرن‌تر از FontAwesome) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Tailwind CSS (CDN برای توسعه سریع) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Vazirmatn', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' },
                        darkbg: '#0f172a', /* رنگ پس زمینه حالت تاریک */
                        darkcard: '#1e293b' /* رنگ کارت ها در حالت تاریک */
                    }
                }
            }
        }
    </script>
    <style>
        /* ترانزیشن نرم برای تغییر تم تاریک و روشن */
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        /* پنهان کردن اسکرول‌بار اما حفظ قابلیت اسکرول */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="bg-gray-50 text-slate-800 dark:bg-darkbg dark:text-slate-200 font-sans antialiased overflow-hidden flex h-screen">

    <!-- سایدبار (منوی کناری) -->
    <aside class="w-64 bg-white dark:bg-darkcard border-l border-gray-200 dark:border-slate-700 flex flex-col h-full shadow-lg z-20 transition-all duration-300">
        <!-- لوگو -->
        <div class="h-20 flex items-center justify-center border-b border-gray-100 dark:border-slate-700">
            <div class="flex items-center gap-3">
                <i class="ph-fill ph-buildings text-4xl text-primary-600 dark:text-primary-500"></i>
                <div>
                    <h1 class="font-bold text-xl tracking-tight text-slate-900 dark:text-white">EstateMind <span class="text-primary-600 dark:text-primary-500">AI</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Smart CRM 2026</p>
                </div>
            </div>
        </div>

        <!-- لینک‌های منو -->
        <nav class="flex-1 overflow-y-auto no-scrollbar py-6 px-4 space-y-2">
            <p class="text-xs font-bold text-slate-400 mb-4 px-2">نمای کلی</p>
            
            <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-primary-50 text-primary-600 dark:bg-primary-900/30 dark:text-primary-400 font-bold transition">
                <i class="ph ph-squares-four text-xl"></i> داشبورد
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-gray-100 dark:text-slate-300 dark:hover:bg-slate-800 font-medium transition">
                <i class="ph ph-funnel text-xl"></i> قیف فروش (CRM)
            </a>

            <p class="text-xs font-bold text-slate-400 mt-6 mb-4 px-2">مشتری و ملک</p>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-gray-100 dark:text-slate-300 dark:hover:bg-slate-800 font-medium transition">
                <i class="ph ph-house-line text-xl"></i> مدیریت فایل‌ها
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-gray-100 dark:text-slate-300 dark:hover:bg-slate-800 font-medium transition">
                <i class="ph ph-users text-xl"></i> دفترچه مشتریان
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-gray-100 dark:text-slate-300 dark:hover:bg-slate-800 font-medium transition relative">
                <i class="ph ph-handshake text-xl"></i> مشارکت در ساخت
                <span class="absolute left-2 bg-rose-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full animate-pulse">جدید</span>
            </a>

            <p class="text-xs font-bold text-slate-400 mt-6 mb-4 px-2">مالی و ابزار</p>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-gray-100 dark:text-slate-300 dark:hover:bg-slate-800 font-medium transition">
                <i class="ph ph-chart-line-up text-xl"></i> گزارشات مالی
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-gray-100 dark:text-slate-300 dark:hover:bg-slate-800 font-medium transition">
                <i class="ph ph-robot text-xl"></i> تنظیمات ربات AI
            </a>
        </nav>
        
        <!-- فوتر سایدبار (خروج) -->
        <div class="p-4 border-t border-gray-100 dark:border-slate-700">
            <a href="#" class="flex items-center justify-center gap-2 w-full py-2.5 rounded-xl bg-slate-100 text-slate-700 hover:bg-rose-500 hover:text-white dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-rose-600 transition font-bold">
                <i class="ph ph-sign-out text-xl"></i> خروج از سیستم
            </a>
        </div>
    </aside>

    <!-- بخش اصلی محتوا -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        
        <!-- هدر بالای صفحه (Top Navbar) با افکت شیشه‌ای -->
        <header class="h-20 bg-white/80 dark:bg-darkcard/80 backdrop-blur-md border-b border-gray-200 dark:border-slate-700 flex items-center justify-between px-8 z-10">
            <div class="flex items-center gap-4">
                <h2 class="text-2xl font-bold text-slate-800 dark:text-white">{{ page_title }}</h2>
            </div>
            
            <div class="flex items-center gap-6">
                <!-- دکمه تم تاریک/روشن -->
                <button onclick="toggleTheme()" class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition">
                    <i id="theme-icon" class="ph ph-moon text-2xl"></i>
                </button>
                
                <!-- نوتیفیکیشن -->
                <button class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition relative">
                    <i class="ph ph-bell text-2xl"></i>
                    <span class="absolute top-1 right-1 w-3 h-3 bg-rose-500 border-2 border-white dark:border-darkcard rounded-full"></span>
                </button>

                <!-- پروفایل کاربر -->
                <div class="flex items-center gap-3 pl-4 border-l border-gray-200 dark:border-slate-700">
                    <div class="text-left hidden sm:block">
                        <p class="text-sm font-bold text-slate-800 dark:text-white">علی محمدی</p>
                        <p class="text-xs text-slate-500 dark:text-slate-400">مدیر شعبه (Admin)</p>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Ali+M&background=3b82f6&color=fff" alt="User" class="w-10 h-10 rounded-full border-2 border-primary-200 shadow-sm">
                </div>
            </div>
        </header>

        <!-- محتوای متغیر صفحات (اینجا پر می‌شود) -->
        <div class="flex-1 overflow-y-auto p-8 relative">
            {% block content %}
            <!-- کدهای صفحات دیگر در اینجا رندر می‌شوند -->
            {% endblock %}
        </div>
    </main>

    <script>
        // اسکریپت مدیریت تم تاریک و روشن
        const htmlTag = document.documentElement;
        const themeIcon = document.getElementById('theme-icon');

        // چک کردن تم ذخیره شده یا تم سیستم
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlTag.classList.add('dark');
            themeIcon.classList.replace('ph-moon', 'ph-sun');
        } else {
            htmlTag.classList.remove('dark');
            themeIcon.classList.replace('ph-sun', 'ph-moon');
        }

        function toggleTheme() {
            htmlTag.classList.toggle('dark');
            if (htmlTag.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
                themeIcon.classList.replace('ph-moon', 'ph-sun');
            } else {
                localStorage.setItem('theme', 'light');
                themeIcon.classList.replace('ph-sun', 'ph-moon');
            }
        }
    </script>
</body>
</html>
